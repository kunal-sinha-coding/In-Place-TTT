model:
  model_path: Qwen/Qwen3-4B-Instruct-2507 #/path/to/your_base_model
  foundation:
    ttt_layers: [0, 6, 12, 18, 24, 30, 36]
    ttt_mode: true
    ttt_proj: true
    ttt_lr: 3
    ttt_chunk: 4096
    ttt_target: freeze

data:
  train_path: data/paul_graham_essays.jsonl #/path/to/your_data
  train_size: 20000000000
  dataloader_type: native
  datasets_type: iterable
  data_type: plaintext
  max_seq_len: 1024 #65536
  text_keys: content_split
  drop_last: true

train:
  output_dir: outputs #/path/to/your_output_dir
  data_parallel_mode: ddp
  ulysses_parallel_size: 1
  global_batch_size: 1 #64
  micro_batch_size: 1
  rmpad: false
  use_wandb: true
  max_steps: 5000
  rmpad_with_pos_ids: false
  dyn_bsz_margin: 0
  dyn_bsz: false
  optimizer: adamw
  lr: 5.0e-6
  lr_warmup_ratio: 0.02
  lr_decay_style: cosine
  lr_decay_ratio: 0.90
  weight_decay: 0.1
  max_grad_norm: 1.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: true
  enable_full_shard: true
  init_device: cuda #meta # Change based on the hardware I have
  ckpt_manager: dcp
  save_checkpoints: false # Added this argument
  save_steps: 500
  save_hf_weights: false # Set to false
  num_train_epochs: 100 # Added this for more training
