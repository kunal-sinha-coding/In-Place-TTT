model:
  model_path: Qwen/Qwen3-4B-Instruct-2507 #/path/to/your_base_model
  foundation:
    ttt_layers: [0, 6, 12, 18, 24, 30, 36]
    ttt_mode: true
    ttt_proj: true
    ttt_lr: 3
    ttt_chunk: 4096
    ttt_target: freeze

data:
  train_path: data/paul_graham_essays.jsonl #/path/to/your_data
  train_size: 20000000000
  dataloader_type: native
  datasets_type: iterable
  data_type: plaintext
  max_seq_len: 8192
  text_keys: content_split
  drop_last: true
  num_workers: 1

train:
  output_dir: outputs #/path/to/your_output_dir
  data_parallel_mode: ddp # Single-GPU runs do not need FSDP sharding across ranks.
  ulysses_parallel_size: 1
  global_batch_size: 1 # Keep the effective batch on one device to avoid multi-GPU assumptions.
  micro_batch_size: 1
  rmpad: false
  use_wandb: true
  max_steps: 5000
  rmpad_with_pos_ids: false
  dyn_bsz_margin: 0
  dyn_bsz: false
  optimizer: adamw
  lr: 5.0e-6
  lr_warmup_ratio: 0.02
  lr_decay_style: cosine
  lr_decay_ratio: 0.90
  weight_decay: 0.1
  max_grad_norm: 1.0
  enable_mixed_precision: false # Switched because false makes us use bfloat16. Name is seemingly backwards
  enable_gradient_checkpointing: true
  enable_activation_offload: true
  activation_gpu_limit: 2.0
  enable_full_shard: false # Disable ZeRO-3 style full sharding when there is only one GPU.
  init_device: cuda
  ckpt_manager: dcp
  save_steps: 500
  save_hf_weights: true
